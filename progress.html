<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Progress · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
<div class='card hero'><div><div class='title'>Progress</div><div class='subtitle'>See the whole picture, not just the scale.</div></div><div class='row'><button id='addWeight' class='btn alt'>Add weigh-in</button></div></div>
<div class='grid two'><div class='card'><div class='section-title'>Weight trend</div><canvas id='chart' width='800' height='240'></canvas></div><div class='card'><div class='section-title'>Snapshot compare</div><div id='snapshot'></div></div></div>
<div class='card'><details><summary>Progress photo timeline</summary><div id='photos' style='margin-top:14px'></div></details></div>
<div class='card'><div class='section-title'>Add progress photos</div><div class='grid three'><div><label>Front</label><input id='front' type='file' accept='image/*' capture='environment'></div><div><label>Side</label><input id='side' type='file' accept='image/*' capture='environment'></div><div><label>Back</label><input id='back' type='file' accept='image/*' capture='environment'></div></div><div class='row' style='margin-top:12px'><button id='savePhotos'>Save check-in</button><span class='tiny'>Camera opens on mobile.</span></div></div>
</div><script>
GLPUI.style(); GLPUI.shell('progress');
function draw(){const logs=Object.values(GLPStore.get().dailyLogs).filter(x=>x.weight).sort((a,b)=>a.date.localeCompare(b.date)); const c=chart.getContext('2d'); c.clearRect(0,0,chart.width,chart.height); c.strokeStyle='rgba(120,120,120,.2)'; c.beginPath(); c.moveTo(40,20); c.lineTo(40,200); c.lineTo(760,200); c.stroke(); if(logs.length<2) return; const weights=logs.map(x=>x.weight); const min=Math.min(...weights)-1,max=Math.max(...weights)+1; c.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--accent'); c.lineWidth=4; c.beginPath(); logs.forEach((log,i)=>{const x=40+(720*(i/(logs.length-1))); const y=200-((log.weight-min)/(max-min))*160; if(i===0)c.moveTo(x,y); else c.lineTo(x,y)}); c.stroke();}
function render(){const d=GLPStore.get(); draw(); const logs=Object.values(d.dailyLogs).filter(x=>x.weight).sort((a,b)=>a.date.localeCompare(b.date)); const first=logs[0], last=logs[logs.length-1]; snapshot.innerHTML= first&&last ? `<div class='grid two'><div class='feed-item'><strong>${first.date}</strong><br>Weight: ${first.weight}${d.settings.units}<br>Energy: ${first.energy||'—'}<br>Appetite: ${first.appetite||'—'}<br>Side experiences: ${(first.sideEffects||[]).join(', ')||'None'}</div><div class='feed-item'><strong>${last.date}</strong><br>Weight: ${last.weight}${d.settings.units}<br>Energy: ${last.energy||'—'}<br>Appetite: ${last.appetite||'—'}<br>Side experiences: ${(last.sideEffects||[]).join(', ')||'None'}</div></div><div style='margin-top:12px' class='tiny'>Change: ${(last.weight-first.weight).toFixed(1)}${d.settings.units}</div>` : 'Add more check-ins to compare progress.';
 photos.innerHTML=d.photos.slice().sort((a,b)=>a.date<b.date?1:-1).map(p=>`<div class='card' style='padding:12px;margin-bottom:12px'><div class='row' style='justify-content:space-between'><strong>${p.date}</strong><span class='tiny'>${p.note||''}</span></div><div class='photo-grid' style='margin-top:10px'><img src='${p.front}' alt='Front'><img src='${p.side}' alt='Side'><img src='${p.back}' alt='Back'></div></div>`).join('');}
render();
addWeight.onclick=()=>{const v=prompt('Enter today\'s weight'); if(!v) return; GLPStore.update(d=>{const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); l.weight=parseFloat(v); d.profile.currentWeight=parseFloat(v); d.community.posts.unshift({id:Math.random().toString(36).slice(2),date:GLPStore.todayISO(),type:'event',text:`${d.profile.name} logged a weigh-in.`});}); render();};
function toData(file,cb){if(!file) return cb(''); const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(file)}
savePhotos.onclick=()=>{toData(front.files[0],f=>toData(side.files[0],s=>toData(back.files[0],b=>{GLPStore.update(d=>{d.photos.push({id:Math.random().toString(36).slice(2),date:GLPStore.todayISO(),front:f||'https://picsum.photos/seed/frontx/480/640',side:s||'https://picsum.photos/seed/sidex/480/640',back:b||'https://picsum.photos/seed/backx/480/640',note:'New check-in'});}); render(); alert('Progress photos saved.');}));};
</script></body></html>
