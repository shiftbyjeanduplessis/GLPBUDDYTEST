<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Exercise · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
<div class='card hero'><div><div class='title'>Exercise</div><div class='subtitle'>Build strength steadily and keep showing up.</div></div><div class='pill' id='levelPill'></div></div>
<div class='grid two'>
  <div class='card'><div class='section-title'>Today's workout</div><div id='workoutList'></div><div class='row' style='margin-top:12px'><button id='start'>Start workout</button><button id='complete' class='btn alt'>Mark complete</button></div></div>
  <div class='card'><div class='section-title'>Progress</div><div id='exerciseMeta'></div><div class='row' style='margin-top:12px'><span class='tag'>Foundation</span><span class='tag'>Builder</span><span class='tag'>Strength</span><span class='tag'>Momentum</span></div></div>
</div>
<div class='card'><div class='section-title'>Movements</div><div class='grid' id='moves'></div></div>
</div><script>
GLPUI.style(); GLPUI.shell('exercise');
const workout=['Chair Squat','Band Row','Wall Press','March in Place','Stretch Finish'];
function render(){const d=GLPStore.get(); levelPill.textContent=`Level: ${d.exercise.level}`; workoutList.innerHTML=`<div class='tiny'>Preview</div><ul>${workout.map(x=>`<li>${x}</li>`).join('')}</ul>`; exerciseMeta.innerHTML=`<div class='metric' style='font-size:26px'>${d.exercise.streakWeeks}</div><div class='tiny'>active weeks</div><div style='margin-top:10px'><strong>${d.exercise.completedSessions}</strong> completed sessions</div>`; moves.innerHTML=workout.map(m=>`<div class='task ${d.exercise.favorites.includes(m)?'done':''}' data-name='${m}'><div><div style='font-weight:800'>${m}</div><div class='tiny'>Tap star to save this movement</div></div><button class='btn ghost star'>${d.exercise.favorites.includes(m)?'★ Saved':'☆ Save'}</button></div>`).join('');}
render();
start.onclick=()=>alert('Workout started. Use this as your guided session preview.');
complete.onclick=()=>{GLPStore.update(d=>{d.exercise.completedSessions+=1; d.exercise.lastWorkoutDate=GLPStore.todayISO(); d.exercise.streakWeeks=Math.max(d.exercise.streakWeeks,1); const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); l.walkDone=true; d.community.posts.unshift({id:Math.random().toString(36).slice(2),date:GLPStore.todayISO(),type:'event',text:`${d.profile.name} completed a workout.`});}); render();};
document.addEventListener('click',e=>{const row=e.target.closest('.task'); const star=e.target.closest('.star'); if(!row||!star) return; const name=row.dataset.name; GLPStore.update(d=>{const f=d.exercise.favorites; const i=f.indexOf(name); i>=0?f.splice(i,1):f.push(name);}); render();});
</script></body></html>
