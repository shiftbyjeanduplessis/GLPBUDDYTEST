<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Meals · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
<div class='card hero'><div><div class='title'>Meals</div><div class='subtitle'>Practical meals with portions, favourites, and a usable shopping list.</div></div><div class='row'><button id='regen' class='btn alt'>Regenerate unlocked</button><button id='emailPlan' class='btn ghost'>Email plan</button></div></div>
<div class='grid two'><div class='card'><div class='section-title'>7-day plan</div><div id='plan'></div></div><div class='card'><div class='section-title'>Shopping list</div><div class='row'><button class='mode btn alt' data-mode='week'>7-day</button><button class='mode btn alt' data-mode='month'>1-month</button></div><div id='shop' style='margin-top:12px'></div></div></div>
</div><script>
GLPUI.style(); GLPUI.shell('meals');
function render(mode){const d=GLPStore.get(); GLPStore.ensurePlan(); const planData=d.meals.currentPlan; plan.innerHTML=planData.map((day,di)=>`<div class='card' style='padding:12px'><div style='font-weight:800'>${day.day}</div>${['breakfast','lunch','dinner'].map(slot=>{const m=day[slot]; return `<div class='meal-row'><div class='slot'>${slot[0].toUpperCase()+slot.slice(1)}</div><div><div style='font-weight:800'>${m.name}</div><div class='tiny'>${m.details}</div><div style='margin-top:6px'><span class='tag'>Portion included</span><span class='tag'>Lifestyle-friendly</span></div></div><div class='row'><button class='btn ghost lock' data-day='${di}' data-slot='${slot}'>${m.locked?'🔒 Locked':'🔓 Lock'}</button><button class='btn alt one' data-day='${di}' data-slot='${slot}'>Refresh</button></div></div>`}).join('')}</div>`).join(''); const list=GLPStore.shoppingList(mode||d.meals.lastShoppingMode); shop.innerHTML=list.map(i=>`<div class='task'><div>${i.name}</div><div class='pill'>${i.count}</div></div>`).join('');}
render();
document.addEventListener('click',e=>{const m=e.target.closest('.mode'); if(m){GLPStore.update(d=>d.meals.lastShoppingMode=m.dataset.mode); render(m.dataset.mode);} const lock=e.target.closest('.lock'); if(lock){GLPStore.update(d=>{const meal=d.meals.currentPlan[lock.dataset.day][lock.dataset.slot]; meal.locked=!meal.locked;}); render();} const one=e.target.closest('.one'); if(one){GLPStore.regenerateUnlocked({day:+one.dataset.day,slot:one.dataset.slot}); render();}});
regen.onclick=()=>{GLPStore.regenerateUnlocked(); render();};
emailPlan.onclick=()=>{const d=GLPStore.get(); const text=d.meals.currentPlan.map(day=>`${day.day}\nBreakfast: ${day.breakfast.name}\nLunch: ${day.lunch.name}\nDinner: ${day.dinner.name}`).join('\n\n'); location.href=`mailto:?subject=GLP Buddy Meal Plan&body=${encodeURIComponent(text)}`;};
</script></body></html>
