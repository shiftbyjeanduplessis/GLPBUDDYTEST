<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Community · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
<div class='card hero'><div><div class='title'>Community</div><div class='subtitle'>A small support hub for real-life progress.</div></div></div>
<div class='grid two'><div class='card'><div class='section-title'>Activity</div><div id='feed'></div></div><div class='card'><div class='section-title'>Friends</div><div id='friends'></div><div style='margin-top:14px'><label>Add friend</label><input id='friendName' placeholder='Name'><input id='friendEmail' placeholder='Email' style='margin-top:8px'><button id='addFriend' style='margin-top:10px'>Send invite</button></div></div></div>
<div class='card'><div class='section-title'>Share a small win</div><textarea id='postText' rows='3' placeholder='What went well today?'></textarea><div class='row' style='margin-top:10px'><button id='share'>Post update</button></div></div>
</div><script>
GLPUI.style(); GLPUI.shell('community');
function render(){const d=GLPStore.get(); feed.innerHTML=d.community.posts.map(p=>`<div class='feed-item'><div class='tiny'>${p.date}</div><div style='margin-top:4px'>${p.text}</div></div>`).join(''); friends.innerHTML=d.community.friends.map(f=>`<div class='task done'><div><div style='font-weight:800'>${f.name}</div><div class='tiny'>${f.email}</div></div><div class='status'>✓</div></div>`).join('');}
render();
share.onclick=()=>{if(!postText.value.trim()) return; GLPStore.update(d=>d.community.posts.unshift({id:Math.random().toString(36).slice(2),date:GLPStore.todayISO(),type:'post',text:postText.value.trim()})); postText.value=''; render();};
addFriend.onclick=()=>{if(!friendName.value||!friendEmail.value) return; GLPStore.update(d=>d.community.friends.push({name:friendName.value,email:friendEmail.value})); friendName.value=''; friendEmail.value=''; render();};
</script></body></html>
