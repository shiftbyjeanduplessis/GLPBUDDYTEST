<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GLP Buddy — Community</title>
<style>
:root{--bg:#f5f1ea;--card:#fffdf8;--text:#24352e;--muted:#6a736d;--line:#dfd8ce;--accent:#5f7f72;--accent2:#b9926e;--shadow:0 10px 30px rgba(44,53,48,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}.wrap{max-width:980px;margin:0 auto;padding:18px 18px 98px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}.title{font-size:32px;font-weight:700}.sub{color:var(--muted);margin-top:4px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}.grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}.metric{font-size:30px;font-weight:700}.muted{color:var(--muted)}button,.btn{border:none;background:var(--accent);color:#fff;padding:12px 16px;border-radius:14px;font-weight:700;cursor:pointer}.btn.alt{background:#ede7df;color:var(--text)}.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:#eef2ef;color:var(--text);font-size:13px;font-weight:700}.warning{background:#fff3e8;border:1px solid #ebd1b2}.list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.bnav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,248,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);z-index:50}.bnav a{padding:12px 4px;text-align:center;font-size:12px;color:var(--muted);font-weight:700}.bnav a.active{color:var(--accent)}.meal-grid{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--line)}.meal-grid:first-child{border-top:none}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.thumbs img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:14px;border:1px solid var(--line)}.compare{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.compare img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;border:1px solid var(--line)}label{font-weight:700;font-size:14px}input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff}canvas{width:100%;height:auto;border-radius:18px;border:1px solid var(--line);background:#f7f4ef}details summary{cursor:pointer;font-weight:700}.tiny{font-size:12px;color:var(--muted)}
</style>
<script src="glp-store.js"></script><script src="glp-common.js"></script></head><body><div class="wrap"><div class="top"><div><div class="title">Community</div><div class="sub">A lightweight support hub for wins, rough days, and practical encouragement.</div></div></div><section class="card"><div class="title" style="font-size:22px">Share a quick update</div><div class="grid two" style="margin-top:12px"><div><label>Post type</label><select id="postType"><option value="win">Small win</option><option value="support">Need support</option><option value="tip">Helpful tip</option></select></div><div><label>Your update</label><textarea id="postText" rows="4" placeholder="Keep it light and real."></textarea></div></div><div class="row" style="margin-top:12px"><button id="postBtn">Post update</button></div></section><section class="card"><div class="row" style="justify-content:space-between"><div><div class="title" style="font-size:22px">Community feed</div><div class="sub">Designed as a calm support hub, not a noisy social network.</div></div><span class="pill">Lightweight hub</span></div><div class="list" id="feed" style="margin-top:12px"></div></section></div><nav class="bnav"><a href="index.html" data-nav="home">Home</a><a href="exercise.html" data-nav="exercise">Exercise</a><a href="progress.html" data-nav="progress">Progress</a><a href="community.html" data-nav="community">Community</a><a href="meals.html" data-nav="meals">Meals</a><a href="settings.html" data-nav="settings">Settings</a></nav><script>GLPUI.ready(function(){GLPStore.ensureSeeded();GLPUI.nav('community');function render(){const holder=document.getElementById('feed');holder.innerHTML='';GLPStore.getCommunityPosts().forEach(function(post){const el=document.createElement('div');el.className='item';el.innerHTML='<div class="row" style="justify-content:space-between"><strong>'+post.author+'</strong><span class="pill">'+post.type+'</span></div><div style="margin:8px 0">'+post.text+'</div><div class="tiny">'+GLPUI.fmtDate(post.when)+'</div>';holder.appendChild(el)})}render();document.getElementById('postBtn').onclick=function(){const txt=postText.value.trim();if(!txt) return;const profile=GLPStore.getProfile();GLPStore.addCommunityPost({author:profile.name||'You',type:postType.value,text:txt});postText.value='';render()}});</script></body></html>
