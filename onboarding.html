<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Welcome · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'><div class='card'><div class='title'>Welcome to GLP Buddy</div><div class='subtitle'>Set up the basics and then start using the app immediately.</div><div class='grid two' style='margin-top:16px'><div><label>Name</label><input id='name'></div><div><label>Starting weight</label><input id='start' type='number'></div><div><label>Goal weight</label><input id='goal' type='number'></div><div><label>Medication</label><input id='med'></div></div><div class='row' style='margin-top:16px'><button id='go'>Save and continue</button></div></div></div><script>GLPUI.style(); const d=GLPStore.get(); name.value=d.profile.name; start.value=d.profile.startWeight; goal.value=d.profile.goalWeight; med.value=d.profile.medication; go.onclick=()=>{GLPStore.update(x=>{x.profile.name=name.value; x.profile.startWeight=parseFloat(start.value)||x.profile.startWeight; x.profile.currentWeight=x.profile.startWeight; x.profile.goalWeight=parseFloat(goal.value)||x.profile.goalWeight; x.profile.medication=med.value||x.profile.medication;}); location.href='index.html';};</script></body></html>
