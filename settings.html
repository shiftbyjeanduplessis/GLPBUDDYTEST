<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Settings · GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
<div class='card hero'><div><div class='title'>Settings</div><div class='subtitle'>Update your profile, reminders, and skins.</div></div></div>
<div class='grid two'><div class='card'><div class='section-title'>Profile</div><div class='grid two'><div><label>Name</label><input id='name'></div><div><label>Goal weight</label><input id='goal' type='number'></div><div><label>Medication</label><input id='med'></div><div><label>Dose</label><input id='dose'></div><div><label>Injection day</label><select id='inj'><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select></div><div><label>Photo reminder</label><select id='photoReminder'><option value='biweekly'>Every 2 weeks</option><option value='monthly'>Every month</option><option value='off'>Manual only</option></select></div></div><div class='row' style='margin-top:12px'><button id='save'>Save settings</button></div></div><div class='card'><div class='section-title'>Skins</div><div class='chips' id='themes'></div><div class='tiny' style='margin-top:10px'>Medical, Feminine, Midnight, Executive, Nature, Glass.</div></div></div>
</div><script>
GLPUI.style(); GLPUI.shell('settings');
const labels={medical:'Medical',feminine:'Feminine',midnight:'Midnight',executive:'Black & Silver',nature:'Nature',glass:'Glass'};
function render(){const d=GLPStore.get(); name.value=d.profile.name; goal.value=d.profile.goalWeight; med.value=d.profile.medication; dose.value=d.profile.dose; inj.value=d.profile.injectionDay; photoReminder.value=d.profile.photoReminder; themes.innerHTML=Object.keys(labels).map(k=>`<button class='chip ${d.profile.theme===k?'active':''}' data-theme='${k}'>${labels[k]}</button>`).join('');}
render();
save.onclick=()=>{GLPStore.update(d=>{d.profile.name=name.value; d.profile.goalWeight=parseFloat(goal.value)||d.profile.goalWeight; d.profile.medication=med.value; d.profile.dose=dose.value; d.profile.injectionDay=inj.value; d.profile.photoReminder=photoReminder.value; d.settings.photoReminder=photoReminder.value;}); alert('Settings saved.'); GLPUI.applyTheme(); render();};
document.addEventListener('click',e=>{const t=e.target.closest('[data-theme]'); if(!t) return; GLPStore.update(d=>d.profile.theme=t.dataset.theme); GLPUI.applyTheme(); render();});
</script></body></html>
