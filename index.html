<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>GLP Buddy</title><script src='glp-store.js'></script><script src='glp-common.js'></script></head><body><div class='wrap'>
  <div class='card hero'><div><div class='title'>GLP Buddy</div><div class='subtitle'>Your lifestyle companion for the week ahead.</div></div><div class='row'><button id='loadDemo' class='btn alt'>Load 6-month demo data</button><a class='btn ghost' href='settings.html'>Skins</a></div></div>
  <div class='grid two'>
    <div class='card'><div class='tiny'>Current weight</div><div class='metric' id='cw'></div><div class='tiny' id='trend'></div></div>
    <div class='card'><div class='tiny'>Toward goal</div><div id='goalText' class='row' style='margin:8px 0 10px'></div><div id='goalBar'></div></div>
  </div>
  <div class='card'><div class='section-title'>Today</div><div class='grid two'>
    <div>
      <div class='section-title small'>How do you feel today?</div>
      <div class='grid three'>
        <div><label>Energy</label><select id='energy'><option value=''>Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
        <div><label>Mood</label><select id='mood'><option value=''>Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
        <div><label>Appetite</label><select id='appetite'><option value=''>Select</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
      </div>
      <div style='margin-top:12px'><label>How are you feeling physically?</label><div class='chips' id='fx'></div></div>
      <div class='row' style='margin-top:12px'><button id='saveCheckin'>Save today</button><span id='saveMsg' class='tiny'></span></div>
    </div>
    <div>
      <div class='section-title small'>Daily actions</div>
      <div class='grid' id='tasks'></div>
      <div class='card' style='margin:14px 0 0;padding:14px'><div class='row'><div><div style='font-weight:800'>Today's water</div><div class='tiny'>Target: 8 glasses</div></div><div class='metric' id='waterCount'>0/8</div></div><div class='row' style='margin-top:10px'><button id='waterAdd'>+1 glass</button><button id='waterSub' class='btn alt'>-1</button></div></div>
    </div>
  </div></div>
  <div class='grid two'>
    <div class='card' id='photoPrompt'></div>
    <div class='card'><div class='section-title'>Badges & streaks</div><div class='chips' id='badges'></div><div class='tiny' id='streaks'></div></div>
  </div>
  <div class='grid two'>
    <div class='card'><div class='section-title'>Meals</div><div id='mealPreview'></div><a class='btn ghost' href='meals.html'>Open meals</a></div>
    <div class='card'><div class='section-title'>Exercise</div><div id='exercisePreview'></div><a class='btn ghost' href='exercise.html'>Open exercise</a></div>
  </div>
</div>
<script>
GLPUI.style(); GLPUI.shell('home');
const sideEffects=['Nausea','Fatigue','Bloating','Headache'];
const fxEl=document.getElementById('fx'); let selected=[];
fxEl.innerHTML=sideEffects.map(s=>`<button class='chip' data-v='${s.toLowerCase()}'>${s}</button>`).join('');
fxEl.onclick=e=>{const b=e.target.closest('.chip'); if(!b) return; b.classList.toggle('active'); selected=[...fxEl.querySelectorAll('.chip.active')].map(x=>x.dataset.v)};
function render(){const data=GLPStore.get(); const log=GLPStore.logFor(); document.getElementById('cw').textContent=`${data.profile.currentWeight}${data.settings.units}`; const pct=((data.profile.startWeight-data.profile.currentWeight)/(data.profile.startWeight-data.profile.goalWeight))*100; document.getElementById('goalBar').innerHTML=GLPUI.progressBar(pct); document.getElementById('goalText').innerHTML=`<span class='metric' style='font-size:24px'>${Math.round(pct)}%</span><span class='tiny'>to goal</span>`;
 document.getElementById('trend').textContent=`Dose: ${data.profile.medication} • ${data.profile.dose} • ${data.profile.injectionDay}`;
 ['energy','mood','appetite'].forEach(k=>document.getElementById(k).value=log[k]||''); selected=log.sideEffects||[]; [...fxEl.children].forEach(c=>c.classList.toggle('active',selected.includes(c.dataset.v)));
 document.getElementById('waterCount').textContent=`${log.water||0}/8`;
 const tasks=[['Log weight',!!log.weight,'Add weigh-in on Progress'],['Take medication',!!log.medicationTaken,'Mark today complete'],['Complete check-in',!!log.checkinDone,'Save how you feel'],['Drink water',(log.water||0)>=8,'Hit 8 glasses'],['Move your body',!!log.walkDone,'Walk or workout']];
 document.getElementById('tasks').innerHTML=tasks.map(([name,done,hint],i)=>`<div class='task ${done?'done':''}' data-task='${i}'><div><div style='font-weight:800'>${name}</div><div class='tiny'>${hint}</div></div><div class='status'>${done?'✓':''}</div></div>`).join('');
 const due=GLPUI.photoDueState(); document.getElementById('photoPrompt').innerHTML=`<div class='section-title'>${due.due?'Progress photos due':'Progress photos'}</div><div class='tiny'>${due.due?'Your next photo check-in is ready.':'Next photo check-in: '+due.next}</div><div class='row' style='margin-top:12px'><a href='progress.html' class='btn'>Take photos</a><button id='remindTomorrow' class='btn alt'>Remind tomorrow</button></div>`;
 document.getElementById('badges').innerHTML=data.badges.map(b=>`<span class='tag'>${b}</span>`).join(''); const st=GLPUI.streaks(); document.getElementById('streaks').textContent=`Check-in streak: ${st.checkin} days • Water streak: ${st.water} days`;
 GLPStore.ensurePlan(); const plan=data.meals.currentPlan; document.getElementById('mealPreview').innerHTML=`<div class='tiny'>Today's meals</div><div style='margin:8px 0 14px'><strong>Lunch:</strong> ${plan[0].lunch.name}<br><strong>Dinner:</strong> ${plan[0].dinner.name}</div>`;
 document.getElementById('exercisePreview').innerHTML=`<div class='tiny'>Today's movement</div><div style='margin:8px 0 14px'><strong>Level:</strong> ${data.exercise.level}<br><strong>Streak:</strong> ${data.exercise.streakWeeks} active weeks</div>`;
}
render();
document.getElementById('loadDemo').onclick=()=>{GLPStore.loadDemo(); location.reload()};
document.getElementById('saveCheckin').onclick=()=>{GLPStore.update(d=>{const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); l.energy=+energy.value||null; l.mood=+mood.value||null; l.appetite=+appetite.value||null; l.sideEffects=selected; l.checkinDone=!!(l.energy&&l.mood&&l.appetite);}); document.getElementById('saveMsg').textContent='Saved.'; render()};
document.getElementById('waterAdd').onclick=()=>{GLPStore.update(d=>{const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); l.water=Math.min(8,(l.water||0)+1)}); render()};
document.getElementById('waterSub').onclick=()=>{GLPStore.update(d=>{const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); l.water=Math.max(0,(l.water||0)-1)}); render()};
document.addEventListener('click',e=>{if(e.target.closest('#remindTomorrow')){alert('We will show this again tomorrow.')} const task=e.target.closest('.task'); if(!task) return; GLPStore.update(d=>{const l=d.dailyLogs[GLPStore.todayISO()]||GLPStore.logFor(); const i=+task.dataset.task; if(i===1) l.medicationTaken=!l.medicationTaken; if(i===4) l.walkDone=!l.walkDone; if(i===0 && !l.weight) l.weight=d.profile.currentWeight;}); render()});
</script></body></html>
