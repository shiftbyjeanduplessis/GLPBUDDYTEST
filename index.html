<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GLP Buddy</title>
<style>
:root{--bg:#f5f1ea;--card:#fffdf8;--text:#24352e;--muted:#6a736d;--line:#dfd8ce;--accent:#5f7f72;--accent2:#b9926e;--shadow:0 10px 30px rgba(44,53,48,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}a{text-decoration:none;color:inherit}.wrap{max-width:980px;margin:0 auto;padding:18px 18px 98px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px}.title{font-size:32px;font-weight:700}.sub{color:var(--muted);margin-top:4px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}.grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}.metric{font-size:30px;font-weight:700}.muted{color:var(--muted)}button,.btn{border:none;background:var(--accent);color:#fff;padding:12px 16px;border-radius:14px;font-weight:700;cursor:pointer}.btn.alt{background:#ede7df;color:var(--text)}.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--line)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:#eef2ef;color:var(--text);font-size:13px;font-weight:700}.warning{background:#fff3e8;border:1px solid #ebd1b2}.list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:18px;padding:14px;background:#fff}.bnav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,253,248,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);z-index:50}.bnav a{padding:12px 4px;text-align:center;font-size:12px;color:var(--muted);font-weight:700}.bnav a.active{color:var(--accent)}.meal-grid{display:grid;grid-template-columns:120px 1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid var(--line)}.meal-grid:first-child{border-top:none}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.thumbs img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:14px;border:1px solid var(--line)}.compare{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.compare img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:16px;border:1px solid var(--line)}label{font-weight:700;font-size:14px}input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff}canvas{width:100%;height:auto;border-radius:18px;border:1px solid var(--line);background:#f7f4ef}details summary{cursor:pointer;font-weight:700}.tiny{font-size:12px;color:var(--muted)}
</style>
<script src="glp-store.js"></script><script src="glp-common.js"></script></head><body><div class="wrap"><div class="top"><div><div class="title" id="hello">GLP Buddy</div><div class="sub">A calmer daily companion for your GLP-1 journey.</div></div><button class="btn alt" id="loadDemo">Load 6-month demo data</button></div><div id="photoPrompt"></div><div class="grid two"><section class="card"><div class="row" style="justify-content:space-between"><div><div class="muted">Current weight</div><div class="metric" id="currentWeight">—</div></div><div><div class="muted">Toward goal</div><div class="metric" id="towardGoal">—</div></div></div><div class="tiny" id="weightMeta"></div></section><section class="card"><div class="muted">Today</div><div class="row" style="margin:10px 0 14px"><span class="pill" id="medPill">Medication</span><span class="pill" id="waterPill">Water</span><span class="pill" id="walkPill">Walk</span></div><div class="row"><button id="markMed">Mark medication taken</button><button class="btn alt" id="logWater">+1 glass</button></div></section></div><div class="grid two"><section class="card"><div class="row" style="justify-content:space-between"><div><div class="title" style="font-size:22px">Meals</div><div class="sub" id="mealSummary"></div></div><a class="btn ghost" href="meals.html">Open meals</a></div></section><section class="card"><div class="row" style="justify-content:space-between"><div><div class="title" style="font-size:22px">Exercise</div><div class="sub" id="exerciseSummary"></div></div><a class="btn ghost" href="exercise.html">Open exercise</a></div></section></div><section class="card"><div class="title" style="font-size:22px">Quick symptom notes</div><div class="row" style="margin-top:12px"><button class="btn alt symptom">Nausea</button><button class="btn alt symptom">Fatigue</button><button class="btn alt symptom">Headache</button><button class="btn alt symptom">Bloating</button></div><div class="tiny" style="margin-top:10px">Logged symptoms show up on Progress.</div></section></div><nav class="bnav"><a href="index.html" data-nav="home">Home</a><a href="exercise.html" data-nav="exercise">Exercise</a><a href="progress.html" data-nav="progress">Progress</a><a href="community.html" data-nav="community">Community</a><a href="meals.html" data-nav="meals">Meals</a><a href="settings.html" data-nav="settings">Settings</a></nav><script>GLPUI.ready(function(){GLPStore.ensureSeeded();GLPUI.nav('home');const p=GLPStore.getProfile();const sum=GLPStore.progressSummary();document.getElementById('hello').textContent='Good morning '+(p.name||'there');document.getElementById('currentWeight').textContent=sum.current?sum.current+' '+(p.units||'kg'):'—';document.getElementById('towardGoal').textContent=sum.towardGoal+'%';document.getElementById('weightMeta').textContent=sum.weighIns+' weigh-ins recorded';const today=GLPStore.getLog(GLPStore.today());document.getElementById('medPill').textContent=today.medicationTaken?'Medication done':((p.medication||'Medication')+' due');document.getElementById('waterPill').textContent=today.water+'/8 glasses';document.getElementById('walkPill').textContent=today.walkDone?'Walk done':'Walk still open';document.getElementById('markMed').onclick=function(){GLPStore.saveLog(GLPStore.today(),{medicationTaken:true});location.reload()};document.getElementById('logWater').onclick=function(){GLPStore.saveLog(GLPStore.today(),{water:(today.water||0)+1});location.reload()};const reminder=GLPStore.photoReminderState();const holder=document.getElementById('photoPrompt');if(reminder.show){holder.innerHTML='<section class="card warning"><div class="row" style="justify-content:space-between"><div><div class="title" style="font-size:22px">Progress photos due</div><div class="sub">Track body changes beyond the scale. Recommended every 2 weeks or monthly.</div></div><div class="row"><a class="btn" href="progress.html#add-photos">Take photos</a><button class="btn alt" id="remindTomorrow">Remind me tomorrow</button><button class="btn ghost" id="dismissPrompt">Dismiss</button></div></div></section>';document.getElementById('remindTomorrow').onclick=function(){GLPStore.dismissPhotoPrompt(true);location.reload()};document.getElementById('dismissPrompt').onclick=function(){GLPStore.dismissPhotoPrompt(false);location.reload()}}const plan=GLPStore.getMealPlan()||GLPStore.generateMealPlan();document.getElementById('mealSummary').textContent='Current weekly plan saved · '+(plan.lockedMeals||[]).length+' meals locked';const ex=GLPStore.getExercise();document.getElementById('exerciseSummary').textContent=(ex.completedThisWeek||0)+'/'+(ex.weeklyTarget||3)+' workouts this week';document.querySelectorAll('.symptom').forEach(function(btn){btn.onclick=function(){const log=GLPStore.getLog(GLPStore.today());const next=new Set(log.symptoms||[]);next.add(btn.textContent.trim());GLPStore.saveLog(GLPStore.today(),{symptoms:Array.from(next)});btn.textContent='Saved'}});document.getElementById('loadDemo').onclick=function(){GLPStore.ensureSeeded(true);location.reload()}});</script></body></html>
